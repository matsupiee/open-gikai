name = "open-gikai-scraper-worker"
main = "src/index.ts"
compatibility_date = "2026-03-05"
compatibility_flags = ["nodejs_compat"]

[triggers]
# */1: 毎分 pending ジョブをディスパッチ
# */5: 5 分おきに失敗ジョブを集約して Slack 通知
crons = ["*/1 * * * *", "*/5 * * * *"]

[[queues.producers]]
queue = "scraper-jobs"
binding = "SCRAPER_QUEUE"

[[queues.consumers]]
queue = "scraper-jobs"
max_batch_size = 1
max_concurrency = 1
max_retries = 1
retry_delay = 120

[observability]
enabled = true
