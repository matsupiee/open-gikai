name: Test API

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/api/**"
      - "packages/db/**"
      - "packages/auth/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "turbo.json"

concurrency:
  group: test-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-api:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 54322:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:54322/postgres_test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile

      - name: Run API tests
        run: bun run --cwd packages/api vitest run
