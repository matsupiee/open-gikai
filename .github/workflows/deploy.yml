name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "turbo.json"
      - ".github/workflows/deploy.yml"

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile

      # マイグレーションは Session Pooler (IPv4) 経由で実行
      # ランタイム用の DATABASE_URL とは別の接続先を使う
      - name: Run database migrations
        run: bunx turbo -F @open-gikai/db db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_MIGRATION_URL }}

      # CSV を更新して main にマージすれば自動で本番 DB に反映される
      - name: Seed municipalities
        run: bunx turbo -F @open-gikai/db db:seed
        env:
          DATABASE_URL: ${{ secrets.DATABASE_MIGRATION_URL }}

      - name: Build web
        run: bunx turbo -F web build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy web worker
        run: bunx wrangler deploy --config apps/web/dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set web worker secrets
        run: |
          echo "${{ secrets.BETTER_AUTH_SECRET }}" | bunx wrangler secret put BETTER_AUTH_SECRET --config apps/web/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy scraper worker
        run: bunx wrangler deploy --config apps/scraper-worker/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set scraper worker secrets
        run: |
          echo "${{ secrets.DATABASE_URL }}" | bunx wrangler secret put DATABASE_URL --config apps/scraper-worker/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
