name: Test Web

on:
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - "packages/api/**"
      - "packages/db-minutes/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig.json"
      - "turbo.json"

concurrency:
  group: test-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-web:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile

      - name: Run Web tests
        run: bun run --cwd apps/web vitest run
