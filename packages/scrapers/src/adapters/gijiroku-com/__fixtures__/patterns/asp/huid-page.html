<A NAME="HUID220280"></A>○中村　委員長　ただいまから民生環境協議会を開きます。<BR>　──────────────────────────────────────<BR>●　所管事項の報告について<BR><P><FORM METHOD="POST"><INPUT TYPE="hidden" NAME="hitcount" VALUE="0"></FORM>
<SCRIPT LANGUAGE="JavaScript">
function get_view_no( huid ){
	var i;
	var cnt;
	if( self.frames.name == 'hat' ){
		parent.v_n_no=null; parent.v_n_shi_no=null;		parent.v_b_no=null; parent.v_b_shi_no=null;		cnt = parent.huid_list.length;
		for( i=0; i<cnt; i++ ){
			if( parseInt( huid ) > parseInt( parent.huid_list[i] ) ){
				parent.v_b_no= i
			}else if( parseInt( huid ) < parseInt( parent.huid_list[i] ) ){
				if( parent.v_n_no==null ){
					parent.v_n_no= i
				}
			}
		}
		cnt = parent.huid_shi_list.length;
		for( i=0; i<cnt; i++ ){
			if( parseInt( huid ) > parseInt( parent.huid_shi_list[i] ) ){
				parent.v_b_shi_no= i
			}else if( parseInt( huid ) < parseInt( parent.huid_shi_list[i] ) ){
				if( parent.v_n_shi_no==null ){
					parent.v_n_shi_no= i
				}
			}
		}
	}
	if( self.frames.name == 'hat_02' ){
		parent.v_n_tou_no=null;		parent.v_b_tou_no=null;		cnt = parent.huid_tou_list.length;
		for( i=0; i<cnt; i++ ){
			if( parseInt( huid ) > parseInt( parent.huid_tou_list[i] ) ){
				parent.v_b_tou_no= i
			}else if( parseInt( huid ) < parseInt( parent.huid_tou_list[i] ) ){
				if( parent.v_n_tou_no==null ){
					parent.v_n_tou_no= i
				}
			}
		}
	}
}
if( self.frames.name == 'hat' ){
	parent.attach_view_flg = false;
}
var hitcount=0;
timerid = -1;
function NaviCheck(version) {
    if ((navigator.appName.indexOf("Netscape") >= 0)
        &&
        (version <= parseInt(navigator.appVersion.substring(0, 3))))
    {
        return true;
    }else if ((navigator.appName.indexOf("Microsoft") >= 0)
        &&
        (version <= parseInt(navigator.appVersion.substring(0, 3))))
    {
        return true;
    } else {
        return false;
    }
}
function get_view_no_of_timer( huid ){
        if(parent.comp_sidebar == -1){
			if(timerid != -1){
				clearInterval(timerid)
	        }
	     }
	get_view_no( '220280' );
}
function init_h(){
    parent.hitp = -1;
    parent.v_shi_hitp = -1;
    parent.v_tou_hitp = -1;
    parent.comp_hat = -1;
    parent.v_hitp     = -1;
    if(NaviCheck(4)){
        if(parent.comp_sidebar != -1){
			if(timerid != -1){
				clearInterval(timerid)
	        }
            timerid = setInterval("get_view_no_of_timer('220280')", 800);
        }else{
			get_view_no( '220280' );
        }
    }
}
