		function Set_Arr_List( mode, huid, url, p_c_url, p_c_huid ){
			var cnt;
			if( mode == '1' ){
				cnt = parent.huid_list.length;
				parent.huid_list[cnt] = huid;
				parent.url_list[cnt]  = url;
			}else if( mode == '2' ){

				cnt = parent.huid_tou_list.length;

			}
		}
	function c_col( i_no, c_mode ){
		if( c_mode=='0' ){
			document.images[i_no].src = "/voices/image/hat0.gif";
		}else if( c_mode=='1' ){
			document.images[i_no].src = "/voices/image/hat1.gif";
			if( parent.v_img_01 != -1 && document.images[ i_no ].name != document.images[ parent.v_img_01 ].name ){
				c_col( parent.v_img_01, '0' );
			}
			parent.v_img_01 =  document.images[ i_no ].name;
		}else if( c_mode=='2' ){
			document.images[i_no].src = "/voices/image/hat2.gif";
			if( parent.v_img_02 != -1 && document.images[ i_no ].name != document.images[ parent.v_img_02 ].name ){
				c_col( parent.v_img_02, '0' );
			}
			parent.v_img_02 =  document.images[ i_no ].name;
		}else if( c_mode=='3' ){
			i_no = i_no.split(",");
			if( i_no[0]!='-1' ){
				c_col( i_no[0], '1' );
			}else{
				if( parent.v_img_01 != -1 ){
					c_col( parent.v_img_01, '0' );
				}
			}
			if( i_no[1]!='-1' ){
				c_col( i_no[1], '2' );
			}else{
				if( parent.v_img_02 != -1 ){
					c_col( parent.v_img_02, '0' );
				}
			}
		}
	}
	function set_hat_check( id ){
		var obj = document.getElementById( id );
		for( i=0; i<  parent.sidebar.document.Form_Word.length; i++ ){ 
			if( parent.sidebar.document.Form_Word.elements[i].type == "checkbox" ){
				if( obj.checked == true ){
					parent.sidebar.document.Form_Word.elements[i].checked = true;
				}else{
					parent.sidebar.document.Form_Word.elements[i].checked = false;
				}
			}
		}
		if( obj.checked == true ){
			parent.sidebar.document.Form_Word.all_check_t.checked = true;
			parent.sidebar.document.Form_Word.all_check_b.checked = true;
		}else{
			parent.sidebar.document.Form_Word.all_check_t.checked = false;
			parent.sidebar.document.Form_Word.all_check_b.checked = false;
		}
	}
	function video_disp(openclose){
